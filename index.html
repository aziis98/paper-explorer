<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Paper Explorer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #f8fafc;
        font-family: Inter, system-ui, sans-serif;
      }
      #chart-svg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        cursor: grab;
      }
      #chart-svg:active {
        cursor: grabbing;
      }
      .fp {
        position: fixed;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }
      .axis text {
        font-size: 11px;
        fill: #94a3b8;
        font-family: system-ui;
      }
      .axis path,
      .axis line {
        stroke: #e2e8f0;
      }
      .grid line {
        stroke: #eef2f7;
        stroke-dasharray: 3, 3;
      }
      .grid path {
        stroke: none;
      }
      .pdot {
        cursor: pointer;
      }
      .pdot:hover {
        opacity: 0.75;
      }
      #tooltip {
        position: fixed;
        display: none;
        background: rgba(255, 255, 255, 0.97);
        border: 0.5px solid rgba(0, 0, 0, 0.07);
        border-radius: 12px;
        padding: 10px 13px;
        max-width: 230px;
        pointer-events: none;
        z-index: 300;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
      }
      #results-list {
        max-height: 320px;
        overflow-y: auto;
      }
      #results-list::-webkit-scrollbar,
      #papers-list::-webkit-scrollbar {
        width: 3px;
      }
      #results-list::-webkit-scrollbar-thumb,
      #papers-list::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 2px;
      }
      .ri {
        cursor: pointer;
        padding: 10px 14px;
        border-bottom: 0.5px solid #f1f5f9;
      }
      .ri:hover {
        background: #f8fafc;
      }
      .ri:last-child {
        border-bottom: none;
      }
      .spin {
        display: inline-block;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <svg id="chart-svg"></svg>

    <!-- Search bar top center -->
    <div
      class="fp"
      id="search-panel"
      style="
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 500px;
        z-index: 200;
      "
    >
      <div
        style="
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 11px 15px;
        "
      >
        <svg
          width="14"
          height="14"
          fill="none"
          stroke="#94a3b8"
          stroke-width="2.2"
          viewBox="0 0 24 24"
          style="flex-shrink: 0"
        >
          <circle cx="11" cy="11" r="8" />
          <path
            stroke-linecap="round"
            d="m21 21-4.35-4.35"
          />
        </svg>
        <input
          id="search-input"
          type="text"
          autocomplete="off"
          placeholder='Search papers, try "Attention is all you need"'
          style="
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
            color: #1e293b;
            background: transparent;
            min-width: 0;
          "
        />
        <div id="srch-spin" style="display: none">
          <iconify-icon
            icon="mdi:loading"
            class="spin"
            style="color: #6366f1; font-size: 16px"
          ></iconify-icon>
        </div>
      </div>
      <div
        id="results-drop"
        style="
          display: none;
          border-top: 0.5px solid #f1f5f9;
        "
      >
        <div id="results-list"></div>
        <p
          id="no-res"
          style="
            display: none;
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            padding: 14px;
          "
        >
          No results found
        </p>
      </div>
    </div>

    <!-- Left panel: added papers -->
    <div
      class="fp"
      id="left-panel"
      style="
        top: 80px;
        left: 16px;
        width: 248px;
        max-height: calc(100vh - 100px);
        display: flex;
        flex-direction: column;
        z-index: 100;
      "
    >
      <div
        style="
          padding: 12px 14px 9px;
          border-bottom: 0.5px solid #f1f5f9;
          flex-shrink: 0;
        "
      >
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
          "
        >
          <p
            style="
              font-size: 12px;
              font-weight: 600;
              color: #1e293b;
            "
          >
            Papers
          </p>
          <span
            id="totals-badge"
            style="font-size: 10px; color: #94a3b8"
          ></span>
        </div>
        <p
          style="
            font-size: 10px;
            color: #94a3b8;
            margin-top: 3px;
          "
        >
          Click a dot to load its references
        </p>
      </div>
      <div
        id="papers-list"
        style="
          flex: 1;
          overflow-y: auto;
          padding: 5px 8px 8px;
        "
      >
        <p
          id="empty-msg"
          style="
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            padding: 18px 0;
          "
        >
          Search above to add papers
        </p>
      </div>
    </div>

    <!-- Right panel: paper info -->
    <div
      class="fp"
      id="right-panel"
      style="
        top: 80px;
        right: 16px;
        width: 420px;
        display: none;
        z-index: 100;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
      "
    >
      <div style="padding: 13px 14px 14px">
        <div
          style="
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 2px;
          "
        >
          <div
            id="info-color-dot"
            style="
              width: 9px;
              height: 9px;
              border-radius: 50%;
              flex-shrink: 0;
              margin-top: 3px;
            "
          ></div>
          <p
            id="info-title"
            style="
              font-size: 13px;
              font-weight: 600;
              color: #1e293b;
              line-height: 1.5;
              flex: 1;
              min-width: 0;
            "
          ></p>
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
            "
          >
            <a
              id="info-doi"
              href="#"
              target="_blank"
              style="
                display: none;
                font-size: 10px;
                font-weight: 600;
                color: #6366f1;
                text-decoration: none;
                align-items: center;
                gap: 4px;
                background: #eef2ff;
                padding: 4px 8px;
                border-radius: 6px;
              "
            >
              OPEN
              <iconify-icon
                icon="mdi:open-in-new"
                style="font-size: 12px"
              ></iconify-icon>
            </a>
            <a
              id="info-arxiv"
              href="#"
              target="_blank"
              style="
                display: none;
                font-size: 10px;
                font-weight: 600;
                color: #991b1b;
                text-decoration: none;
                align-items: center;
                gap: 4px;
                background: #fef2f2;
                padding: 4px 8px;
                border-radius: 6px;
              "
            >
              ARXIV
              <iconify-icon
                icon="mdi:file-document-outline"
                style="font-size: 12px"
              ></iconify-icon>
            </a>
            <a
              id="info-pdf"
              href="#"
              target="_blank"
              style="
                display: none;
                font-size: 10px;
                font-weight: 600;
                color: #b91c1c;
                text-decoration: none;
                align-items: center;
                gap: 4px;
                background: #fef2f2;
                padding: 4px 8px;
                border-radius: 6px;
              "
            >
              PDF
              <iconify-icon
                icon="mdi:file-pdf-box"
                style="font-size: 12px"
              ></iconify-icon>
            </a>
            <button
              id="info-close"
              style="
                background: none;
                border: none;
                cursor: pointer;
                font-size: 15px;
                color: #cbd5e1;
                line-height: 1;
                padding: 4px;
              "
            >
              &#x2715;
            </button>
          </div>
        </div>
        <p
          id="info-authors"
          style="
            font-size: 11px;
            color: #64748b;
            margin-bottom: 10px;
            margin-left: 15px;
          "
        ></p>
        <div
          style="
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
          "
        >
          <div
            style="
              flex: 1;
              background: #f8fafc;
              border-radius: 10px;
              padding: 7px 10px;
            "
          >
            <p
              style="
                font-size: 9px;
                color: #94a3b8;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                margin-bottom: 3px;
              "
            >
              Year
            </p>
            <p
              id="info-year"
              style="
                font-size: 18px;
                font-weight: 600;
                color: #1e293b;
                line-height: 1;
              "
            ></p>
          </div>
          <div
            style="
              flex: 1;
              background: #f8fafc;
              border-radius: 10px;
              padding: 7px 10px;
            "
          >
            <p
              style="
                font-size: 9px;
                color: #94a3b8;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                margin-bottom: 3px;
              "
            >
              Citations
            </p>
            <p
              id="info-cites"
              style="
                font-size: 18px;
                font-weight: 600;
                color: #6366f1;
                line-height: 1;
              "
            ></p>
          </div>
        </div>
        <div
          style="
            border-top: 0.5px solid #f1f5f9;
            padding-top: 14px;
            margin-top: 5px;
          "
        >
          <div
            style="
              display: flex;
              gap: 8px;
              margin-bottom: 16px;
            "
          >
            <div style="flex: 1">
              <p
                style="
                  font-size: 10px;
                  color: #94a3b8;
                  font-weight: 600;
                  text-transform: uppercase;
                  margin-bottom: 6px;
                "
              >
                References
              </p>
              <div style="display: flex; gap: 4px">
                <button
                  id="load-refs-10"
                  style="
                    flex: 1;
                    padding: 6px;
                    font-size: 10px;
                    border: 1px solid #e2e8f0;
                    border-radius: 6px;
                    background: white;
                    cursor: pointer;
                    color: #475569;
                  "
                >
                  Top 10
                </button>
                <button
                  id="load-refs-all"
                  style="
                    flex: 1;
                    padding: 6px;
                    font-size: 10px;
                    border: 1px solid #6366f1;
                    border-radius: 6px;
                    background: #6366f1;
                    cursor: pointer;
                    color: white;
                  "
                >
                  All
                </button>
              </div>
            </div>
            <div style="flex: 1">
              <p
                style="
                  font-size: 10px;
                  color: #94a3b8;
                  font-weight: 600;
                  text-transform: uppercase;
                  margin-bottom: 6px;
                "
              >
                Citations
              </p>
              <div style="display: flex; gap: 4px">
                <button
                  id="load-cits-10"
                  style="
                    flex: 1;
                    padding: 6px;
                    font-size: 10px;
                    border: 1px solid #e2e8f0;
                    border-radius: 6px;
                    background: white;
                    cursor: pointer;
                    color: #475569;
                  "
                >
                  Top 10
                </button>
                <button
                  id="load-cits-all"
                  style="
                    flex: 1;
                    padding: 6px;
                    font-size: 10px;
                    border: 1px solid #6366f1;
                    border-radius: 6px;
                    background: #6366f1;
                    cursor: pointer;
                    color: white;
                  "
                >
                  All
                </button>
              </div>
            </div>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 16px;
              margin-bottom: 8px;
              border-bottom: 1px solid #f1f5f9;
              margin-left: -14px;
              margin-right: -14px;
              padding: 0 14px;
            "
          >
            <button
              id="tab-refs"
              onclick="setTab('refs')"
              style="
                font-size: 11px;
                font-weight: 600;
                color: #6366f1;
                border: none;
                background: none;
                cursor: pointer;
                padding: 8px 0;
                border-bottom: 2px solid #6366f1;
                transition: all 0.2s;
              "
            >
              References
            </button>
            <button
              id="tab-cits"
              onclick="setTab('cits')"
              style="
                font-size: 11px;
                font-weight: 500;
                color: #94a3b8;
                border: none;
                background: none;
                cursor: pointer;
                padding: 8px 0;
                border-bottom: 2px solid transparent;
                transition: all 0.2s;
              "
            >
              Cited In
            </button>
            <div
              style="
                flex: 1;
                display: flex;
                justify-content: flex-end;
              "
            >
              <div id="ref-spin" style="display: none">
                <iconify-icon
                  icon="mdi:loading"
                  class="spin"
                  style="color: #6366f1; font-size: 16px"
                ></iconify-icon>
              </div>
            </div>
          </div>

          <div id="table-container" style="margin: 0 -14px">
            <table
              id="ref-table"
              style="
                width: 100%;
                border-collapse: collapse;
                font-size: 11px;
                table-layout: fixed;
              "
            >
              <thead>
                <tr
                  style="
                    border-bottom: 1px solid #f1f5f9;
                    text-align: left;
                  "
                >
                  <th
                    style="
                      padding: 8px 14px;
                      color: #94a3b8;
                      font-weight: 500;
                      width: 62%;
                      cursor: pointer;
                    "
                    onclick="setSort('title')"
                  >
                    Paper
                  </th>
                  <th
                    style="
                      padding: 8px 4px;
                      color: #94a3b8;
                      font-weight: 500;
                      width: 16%;
                      cursor: pointer;
                    "
                    onclick="setSort('year')"
                  >
                    Year
                  </th>
                  <th
                    style="
                      padding: 8px 14px;
                      color: #94a3b8;
                      font-weight: 500;
                      width: 22%;
                      text-align: right;
                      cursor: pointer;
                    "
                    onclick="setSort('citations')"
                  >
                    Cites
                  </th>
                </tr>
              </thead>
              <tbody id="ref-table-body"></tbody>
            </table>
          </div>
          <p
            id="ref-status"
            style="
              font-size: 10px;
              color: #94a3b8;
              margin-top: 8px;
              text-align: center;
            "
          ></p>
        </div>
      </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip">
      <p
        id="tt-title"
        style="
          font-size: 11px;
          font-weight: 600;
          color: #1e293b;
          line-height: 1.4;
          margin-bottom: 4px;
        "
      ></p>
      <p
        id="tt-auth"
        style="
          font-size: 10px;
          color: #64748b;
          margin-bottom: 4px;
        "
      ></p>
      <div style="display: flex; gap: 12px">
        <span style="font-size: 10px; color: #94a3b8"
          >Year:
          <b
            id="tt-year"
            style="color: #475569; font-weight: 500"
          ></b
        ></span>
        <span style="font-size: 10px; color: #94a3b8"
          >&#x2191;
          <b
            id="tt-cites"
            style="color: #6366f1; font-weight: 500"
          ></b
        ></span>
      </div>
      <p
        id="tt-hint"
        style="
          font-size: 10px;
          color: #94a3b8;
          margin-top: 4px;
          font-style: italic;
        "
      >
        click to load references
      </p>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
